name: Build and Auto-Release Unsigned IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  XCODE_VERSION_PREFIX: "26"                  # 期望的 Xcode 主版本号
  IOS_TARGET: "26.0"                          # iOS 部署目标
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true    # 消除 Node 警告

jobs:
  build-ios:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Auto-Detect Project Name and Type
        id: detect_project
        run: |
          # 1. 优先查找是否存在 CocoaPods 的 .xcworkspace
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -n 1)
          if [ -n "$WORKSPACE" ]; then
            PROJECT_NAME=$(basename "$WORKSPACE" .xcworkspace)
            BUILD_ARGS="-workspace $WORKSPACE -scheme $PROJECT_NAME"
            echo "Detected Workspace: $WORKSPACE"
          else
            # 2. 如果没有 workspace，则查找普通的 .xcodeproj
            PROJECT=$(find . -maxdepth 1 -name "*.xcodeproj" | head -n 1)
            if [ -n "$PROJECT" ]; then
              PROJECT_NAME=$(basename "$PROJECT" .xcodeproj)
              BUILD_ARGS="-project $PROJECT"
              echo "Detected Project: $PROJECT"
            else
              echo "Error: No .xcodeproj or .xcworkspace found in the root directory!"
              exit 1
            fi
          fi
          
          # 3. 将动态获取的名字和构建参数写入环境变量，供后续步骤使用
          echo "APP_NAME=$PROJECT_NAME" >> $GITHUB_ENV
          echo "BUILD_ARGS=$BUILD_ARGS" >> $GITHUB_ENV
          echo "✅ Successfully set APP_NAME to $PROJECT_NAME"

      - name: Select Xcode Version
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_${{ env.XCODE_VERSION_PREFIX }}*.app 2>/dev/null | tail -n 1)
          if [ -z "$XCODE_PATH" ]; then
            echo "Error: Could not find any Xcode ${{ env.XCODE_VERSION_PREFIX }} version."
            exit 1
          fi
          echo "Selected Xcode path: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"

      - name: Extract App Version
        id: get_version
        run: |
          # 使用自动匹配的 BUILD_ARGS 获取版本号
          VERSION=$(xcodebuild -showBuildSettings ${{ env.BUILD_ARGS }} -configuration Release | grep MARKETING_VERSION | head -n 1 | awk -F '= ' '{print $2}')
          if [ -z "$VERSION" ]; then VERSION="1.0.0"; fi
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build Unsigned App
        run: |
          # 使用自动匹配的 BUILD_ARGS 进行编译
          xcodebuild build \
            ${{ env.BUILD_ARGS }} \
            -configuration Release \
            -sdk iphoneos \
            SYMROOT=$(pwd)/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            IPHONEOS_DEPLOYMENT_TARGET=${{ env.IOS_TARGET }}

      - name: Package to IPA
        run: |
          mkdir -p build/Payload
          cp -r build/Release-iphoneos/*.app build/Payload/ 2>/dev/null || true
          cd build
          zip -r ${{ env.APP_NAME }}_Unsigned.ipa Payload/

      - name: Create Release and Upload IPA
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}-b${{ github.run_number }}
          name: ${{ env.APP_NAME }} v${{ env.APP_VERSION }} (Unsigned)
          body: |
            ## Automated Release
            * **App Name:** ${{ env.APP_NAME }}
            * **Version:** v${{ env.APP_VERSION }}
            * **Build:** #${{ github.run_number }}
            * **Environment:** Xcode ${{ env.XCODE_VERSION_PREFIX }} / Target: iOS ${{ env.IOS_TARGET }}
            
            > **Notice:** Unsigned IPA for TrollStore or sideloading tools.
          draft: false
          prerelease: false
          files: build/${{ env.APP_NAME }}_Unsigned.ipa
