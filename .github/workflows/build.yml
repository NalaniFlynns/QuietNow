name: Build and Auto-Release Unsigned IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ios:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: |
          # 动态查找 /Applications 目录下所有 Xcode 26 开头的版本，并选择排序最靠后的一个（最新版）
          XCODE_PATH=$(ls -d /Applications/Xcode_26*.app | tail -n 1)
          if [ -z "$XCODE_PATH" ]; then
            echo "Error: Could not find any Xcode 26 version."
            echo "Available Xcode versions in /Applications:"
            ls -d /Applications/Xcode*.app
            exit 1
          fi
          echo "Selected Xcode path: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"

      - name: Extract App Version
        id: get_version
        run: |
          VERSION=$(xcodebuild -showBuildSettings -project IMUNavigator.xcodeproj -configuration Release | grep MARKETING_VERSION | head -n 1 | awk -F '= ' '{print $2}')
          if [ -z "$VERSION" ]; then VERSION="1.0.0"; fi
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build Unsigned App
        run: |
          xcodebuild build \
            -project IMUNavigator.xcodeproj \
            -configuration Release \
            -sdk iphoneos \
            -alltargets \
            SYMROOT=$(pwd)/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            IPHONEOS_DEPLOYMENT_TARGET=26.0

      - name: Package to IPA
        run: |
          mkdir -p build/Payload
          cp -r build/Release-iphoneos/*.app build/Payload/ 2>/dev/null || true
          cd build
          zip -r IMUNavigator_Unsigned.ipa Payload/

      - name: Create Release and Upload IPA
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}-b${{ github.run_number }}
          name: IMUNavigator v${{ env.APP_VERSION }} (Unsigned)
          body: |
            IMUNavigator Release
            Version: v${{ env.APP_VERSION }}
            Build: #${{ github.run_number }}
            Environment: Xcode 26 (Swift 6.2) / Target: iOS 26.0
            Notice: Unsigned IPA for TrollStore or sideloading tools.
          draft: false
          prerelease: false
          files: build/IMUNavigator_Unsigned.ipa
